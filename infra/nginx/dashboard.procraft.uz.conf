# dashboard.procraft.uz — Next.js SSR (docker: web, 127.0.0.1:3001).
#
# Drop this into the existing server block on the host (keep the current
# listen/ssl_certificate/certbot lines as they are) and REPLACE the static
# `root /var/www/procraft/apps/web/dist; try_files ...` section with the
# proxy locations below.
#
# ── ROLLBACK (minutes): comment the proxy `location /` back out and restore ──
#   root /var/www/procraft/apps/web-legacy/dist;
#   index index.html;
#   location / { try_files $uri $uri/ /index.html; }
# `pnpm run build` keeps apps/web-legacy/dist fresh on every deploy.

server {
    listen 80;
    server_name dashboard.procraft.uz;
    # In production this block already listens on 443 with certbot-managed
    # SSL; only the location directives below need to change.

    # Hashed build assets — long immutable cache (Next also sets the header).
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
