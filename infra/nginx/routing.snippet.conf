# Skeleton upstream + API proxy snippet — compose into production config.

upstream procraft_api {
    server api:8080;
}

server {
    listen 80;
    server_name api.procraft.uz;

    location /api/ {
        proxy_pass http://procraft_api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Cookie attributes set by ASP.NET responses; nginx should not mutate unless required.
    }

    location /uploads/ {
        proxy_pass http://procraft_api/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Mount landing at procraft.uz, dashboard SPA at dashboard.procraft.uz,
    # admin SPA at admin.procraft.uz, and profile SPA on wildcard subdomains.
}
