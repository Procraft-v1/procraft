# Skeleton upstream + API proxy snippet — compose into production config.

upstream procraft_api {
    server api:8080;
}

server {
    listen 80;
    server_name procraft.uz;

    location /api/ {
        proxy_pass http://procraft_api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Cookie attributes set by ASP.NET responses; nginx should not mutate unless required.
    }

    location /uploads/ {
        proxy_pass http://procraft_api/uploads/;
        proxy_set_header Host $host;
    }

    # Mount landing dist at `/` and dashboards under `/dashboard/` inside separate maps.
}
