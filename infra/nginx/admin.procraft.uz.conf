# admin.procraft.uz — Next.js (docker: admin, 127.0.0.1:3103).
#
# ── ROLLBACK (minutes): restore the static block ──
#   root /var/www/procraft/apps/admin-legacy/dist;
#   index index.html;
#   location / { try_files $uri $uri/ /index.html; }

server {
    listen 80;
    server_name admin.procraft.uz;
    # Keep the existing SSL lines in production.

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3103;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3103;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
