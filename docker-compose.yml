version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-procraft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-procraft}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-procraft}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      DATABASE_URL: Host=postgres;Port=5432;Database=${POSTGRES_DB:-procraft};Username=${POSTGRES_USER:-procraft};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-procraft};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ISSUER: ${JWT_ISSUER:-procraft.app}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-procraft.app}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES:-15}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-7}
      JWT_ACCESS_COOKIE_NAME: ${JWT_ACCESS_COOKIE_NAME:-__Host-procraft_access}
      JWT_REFRESH_COOKIE_NAME: ${JWT_REFRESH_COOKIE_NAME:-__Host-procraft_refresh}
      CSRF_COOKIE_NAME: ${CSRF_COOKIE_NAME:-procraft_csrf}
      CSRF_COOKIE_DOMAIN: ${CSRF_COOKIE_DOMAIN:-.procraft.uz}
      JWT_COOKIE_SAMESITE: ${JWT_COOKIE_SAMESITE:-None}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-true}
      Admin__Username: ${ADMIN_USERNAME:-admin}
      Admin__Password: ${ADMIN_PASSWORD:-CHANGE_ME}
      Admin__SessionSecret: ${ADMIN_SESSION_SECRET:-CHANGE_ME_LONG_RANDOM_VALUE}
      Smtp__Host: ${Smtp__Host:-}
      Smtp__Port: ${Smtp__Port:-587}
      Smtp__Username: ${Smtp__Username:-}
      Smtp__Password: ${Smtp__Password:-}
      Smtp__FromAddress: ${Smtp__FromAddress:-noreply@procraft.uz}
      Smtp__FromName: ${Smtp__FromName:-Procraft}
      Smtp__EnableSsl: ${Smtp__EnableSsl:-true}
      Telegram__BotToken: ${Telegram__BotToken:-}
      Telegram__BotUsername: ${Telegram__BotUsername:-}
      Telegram__WebhookUrl: ${Telegram__WebhookUrl:-}
      Eskiz__Email: ${Eskiz__Email:-}
      Eskiz__Password: ${Eskiz__Password:-}
      Eskiz__Sender: ${Eskiz__Sender:-4546}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://procraft.uz,https://www.procraft.uz,https://dashboard.procraft.uz,https://admin.procraft.uz}
      UPLOADS_ROOT: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --- Next.js frontends (SSR) ---------------------------------------------
  # nginx (host) proxies: dashboard.procraft.uz -> 127.0.0.1:3001,
  # *.procraft.uz -> 127.0.0.1:3002, admin.procraft.uz -> 127.0.0.1:3003.
  # Rollback: point nginx back at apps/*-legacy/dist (see docs/NEXTJS_MIGRATION.md).

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.procraft.uz/api}
        VITE_UPLOADS_URL: ${VITE_UPLOADS_URL:-https://api.procraft.uz/uploads}
        VITE_APP_NAME: ${VITE_APP_NAME:-Procraft}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"

  profiles:
    build:
      context: .
      dockerfile: apps/profiles/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.procraft.uz/api}
        VITE_UPLOADS_URL: ${VITE_UPLOADS_URL:-https://api.procraft.uz/uploads}
        VITE_APP_NAME: ${VITE_APP_NAME:-Procraft}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # SSR profile fetches go over the internal docker network; falls back
      # to the public API URL when unset.
      API_INTERNAL_URL: http://api:8080/api
    ports:
      - "127.0.0.1:3002:3000"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.procraft.uz/api}
        VITE_UPLOADS_URL: ${VITE_UPLOADS_URL:-https://api.procraft.uz/uploads}
        VITE_APP_NAME: ${VITE_APP_NAME:-Procraft}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3000"

volumes:
  postgres_data:
  uploads_data:
